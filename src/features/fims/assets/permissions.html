<!DOCTYPE html>
<html lang="it">
  <head>
      <script>
        function redirect(url) {
          window.location.href = url;
        }
        function createAndSubmit(accepted) {
          var redirectForm = document.createElement("FORM");
          redirectForm.setAttribute("id","RedirectFormId");
          document.body.appendChild(redirectForm);
        
          var idTokenInput = document.createElement("INPUT");
          idTokenInput.setAttribute("id","acceptedId");
          idTokenInput.setAttribute("name","accepted");
          idTokenInput.setAttribute("type","hidden");
          idTokenInput.setAttribute("value", accepted);
          document.getElementById("RedirectFormId").appendChild(idTokenInput);
          
          redirectForm.method = "POST";
          redirectForm.action = "http://localhost:3000/fims/interaction/:id/confirm";
          redirectForm.submit();  
        }
        function deny() {
            createAndSubmit("false");
        }
        function accept() {
            createAndSubmit("true");
        }
      </script>
      <style>
          .item {
              border-bottom: 1px solid gray;
              padding: 2px 8px;
              margin-bottom: 12px;
          }

          .info {
              padding: 8px;
              margin-bottom: 12px;
          }

          .container-btns {
              text-align: center;
              margin-top: 24px;
          }

          .btn {
              width: 45%;
              padding: 8px;
              border-radius: 4px;
          }

          .btn-cancel {
              background: #FFFFFF;
              border-color: #0073E6;
              color: #0073E6;
          }

          .btn-confirm {
              background: #0073E6;
              color: #FFFFFF;
              border-color: #0073E6;
          }
      </style>
      <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body style="background-color: #d4d4d4;">
      <h1>Per accedere devi condividere i seguenti dati:</h1>
      <div class="item">
          <h3>Nome</h3>
      </div>
      <div class="item">
          <h3>Cognome</h3>
      </div>
      <div class="item">
          <h3>Codice fiscale</h3>
      </div>
      <div class="item">
          <h3>Data di nascita</h3>
      </div>
      <p class="info">
          Questi dati, necessari all’autenticazione, saranno condivisi con <b>Regione Lazio</b> secondo <a href="https://www.pagopa.gov.it/it/privacy-policy/">privacy policy</a>.
      </p>
      <div class="container-btns">
          <button class="btn btn-cancel" onclick="deny()">Annulla</button>
          <button class="btn btn-confirm" onclick="accept()">Ok, va bene</button>
      </div>
  </body>
</html>
